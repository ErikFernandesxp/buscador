<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Buscador Inteligente</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🔎 Buscador Inteligente</h1>

  <div class="search-box">
    <input id="busca" placeholder="Digite o produto...">
    <button onclick="buscar()">Buscar</button>
  </div>

  <!-- 🔥 filtro preço -->
  <div class="filters">
    <input id="min" type="number" placeholder="Preço mín">
    <input id="max" type="number" placeholder="Preço máx">
  </div>

  <div id="melhor"></div>

  <div id="grid" class="grid"></div>

</div>

<script src="app.js"></script>

</body>
</html>

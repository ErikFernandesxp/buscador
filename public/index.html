<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Buscador Inteligente</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .search-box {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    input {
      width: 300px;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🔎 Buscador Inteligente</h1>

<div class="search-box">
  <input id="q" placeholder="Digite o produto...">
  <button onclick="buscar()">Buscar</button>
</div>

<div id="result" class="grid"></div>

<script>
async function buscar() {
  const q = document.getElementById('q').value;

  const res = await fetch(`/search?q=${q}`);
  const data = await res.json();

  const container = document.getElementById('result');
  container.innerHTML = '';

  if (!data.length) {
    container.innerHTML = "<p>Nenhum resultado</p>";
    return;
  }

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <h3>${item.title}</h3>
        <p class="price">R$ ${item.price}</p>
        <small>${item.source || ''}</small>
      </div>
    `;
  });
}
</script>

</body>
</html>
